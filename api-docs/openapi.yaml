# Multica REST API — OpenAPI 3.0.3
#
# HAND-DERIVED from source at commit 5ed381a9d (2026-07-02). Multica ships no
# machine-generated spec; the sources of truth are:
#   - server/cmd/server/router.go            (route registrations)
#   - packages/core/api/client.ts            (request shapes used by the official frontend)
#   - packages/core/api/schemas.ts           (zod response schemas)
#   - packages/core/types/*.ts               (TS response types)
#
# Coverage policy (deliberate):
#   - EVERY route in router.go is listed (path + method + summary) so this file
#     is diffable against upstream route changes.
#   - Full request/response schemas are provided for the endpoints relevant to
#     external tracking/reporting integrations (auth, workspaces, members,
#     issues, comments, timeline, projects, tasks, dashboard rollups, agent
#     activity). Everything else returns `GenericObject`/`GenericArray` — see
#     the source files above for exact shapes when you need them.
#   - Server enums are documented as plain strings: upstream's own frontend
#     treats them leniently and new values appear without notice.
openapi: 3.0.3
info:
  title: Multica API
  description: >
    REST API of the Multica task-management platform, as implemented by the Go
    backend (`server/`). Derived by hand from the Chi router and the official
    TypeScript client; not published or guaranteed stable by upstream.
  version: 5ed381a9d
servers:
  - url: http://localhost:8080
    description: Local dev server (`make server`)

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Two credential types for external callers:
#   1. Personal Access Token (PAT, prefix `mul_`) — create via
#      POST /api/tokens or the Settings UI. Send as `Authorization: Bearer mul_...`.
#   2. Session cookie — browser flow only (POST /auth/send-code + verify-code).
# Workspace-scoped routes ALSO require workspace selection via the
# `X-Workspace-ID` (UUID) or `X-Workspace-Slug` header.
security:
  - bearerAuth: []

tags:
  - name: public
  - name: auth
  - name: me
  - name: workspaces
  - name: members
  - name: invitations
  - name: tokens
  - name: issues
  - name: comments
  - name: labels
  - name: projects
  - name: squads
  - name: agents
  - name: skills
  - name: tasks
  - name: dashboard
  - name: runtimes
  - name: chat
  - name: inbox
  - name: attachments
  - name: pins
  - name: autopilots
  - name: integrations
  - name: cloud
  - name: daemon
  - name: webhooks

paths:
  # -------------------------------------------------------------------------
  # Health / public
  # -------------------------------------------------------------------------
  /health:
    get: { tags: [public], security: [], summary: Liveness check, responses: { "200": { description: OK } } }
  /readyz:
    get: { tags: [public], security: [], summary: Readiness check, responses: { "200": { description: OK } } }
  /healthz:
    get: { tags: [public], security: [], summary: Readiness check (alias of /readyz), responses: { "200": { description: OK } } }
  /health/realtime:
    get: { tags: [public], security: [], summary: Realtime subsystem metrics (loopback or REALTIME_METRICS_TOKEN bearer), responses: { "200": { description: JSON metrics } } }
  /ws:
    get:
      tags: [public]
      summary: Workspace realtime WebSocket (event push — issue/comment/task updates)
      description: >
        Upgrade to WebSocket. Auth via session cookie or PAT. See
        packages/core/api/ws-client.ts for the event contract. Useful for a
        tracking system that wants push instead of polling.
      responses: { "101": { description: Switching Protocols } }
  /api/config:
    get:
      tags: [public]
      security: []
      summary: Public app configuration
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/AppConfig" } } }
  /api/contact-sales:
    post: { tags: [public], security: [], summary: Contact-sales form (rate-limited), responses: { "200": { $ref: "#/components/responses/Generic" } } }

  # -------------------------------------------------------------------------
  # Auth (public, rate-limited)
  # -------------------------------------------------------------------------
  /auth/send-code:
    post:
      tags: [auth]
      security: []
      summary: Send email login code
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { email: { type: string } }, required: [email] }
      responses: { "200": { $ref: "#/components/responses/Generic" } }
  /auth/verify-code:
    post:
      tags: [auth]
      security: []
      summary: Verify email code, establish session
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { email: { type: string }, code: { type: string } }, required: [email, code] }
      responses: { "200": { $ref: "#/components/responses/Generic" } }
  /auth/google:
    post: { tags: [auth], security: [], summary: Google OAuth login, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /auth/logout:
    post: { tags: [auth], security: [], summary: End session, responses: { "200": { $ref: "#/components/responses/Generic" } } }

  # -------------------------------------------------------------------------
  # Current user
  # -------------------------------------------------------------------------
  /api/me:
    get:
      tags: [me]
      summary: Current user
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
    patch:
      tags: [me]
      summary: Update current user
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
  /api/me/onboarding:
    patch: { tags: [me], summary: Patch onboarding questionnaire, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/me/onboarding/complete:
    post: { tags: [me], summary: Mark onboarding complete, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/me/onboarding/cloud-waitlist:
    post: { tags: [me], summary: Join cloud waitlist, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/me/onboarding/runtime-bootstrap:
    post: { tags: [me], deprecated: true, summary: "DEPRECATED shim (desktop < v3)", responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/me/onboarding/no-runtime-bootstrap:
    post: { tags: [me], deprecated: true, summary: "DEPRECATED shim (desktop < v3)", responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/cli-token:
    post: { tags: [tokens], summary: Issue CLI token, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/upload-file:
    post: { tags: [attachments], summary: Upload a file (multipart), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/feedback:
    post: { tags: [me], summary: Submit product feedback, responses: { "200": { $ref: "#/components/responses/Generic" } } }

  # -------------------------------------------------------------------------
  # Personal access tokens — the credential for external API consumers
  # -------------------------------------------------------------------------
  /api/tokens:
    get: { tags: [tokens], summary: List personal access tokens, responses: { "200": { $ref: "#/components/responses/GenericList" } } }
    post: { tags: [tokens], summary: Create personal access token (returns plaintext `mul_` token once), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/tokens/current/renew:
    post: { tags: [tokens], summary: Renew the token used for this request, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/tokens/{id}:
    delete:
      tags: [tokens]
      summary: Revoke personal access token
      parameters: [{ $ref: "#/components/parameters/PathId" }]
      responses: { "200": { $ref: "#/components/responses/Generic" } }

  # -------------------------------------------------------------------------
  # Workspaces & members
  # -------------------------------------------------------------------------
  /api/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces the caller belongs to
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Workspace" } } } } }
    post: { tags: [workspaces], summary: Create workspace, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}:
    parameters: [{ $ref: "#/components/parameters/PathId" }]
    get:
      tags: [workspaces]
      summary: Get workspace (member)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Workspace" } } } }
    put: { tags: [workspaces], summary: Update workspace (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
    patch: { tags: [workspaces], summary: Update workspace (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
    delete: { tags: [workspaces], summary: Delete workspace (owner), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/members:
    parameters: [{ $ref: "#/components/parameters/PathId" }]
    get:
      tags: [members]
      summary: List members with user profile — the roster a tracking system joins actor_id against
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberWithUser" } } } } }
    post: { tags: [members], summary: Invite member (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/members/{memberId}:
    parameters: [{ $ref: "#/components/parameters/PathId" }, { name: memberId, in: path, required: true, schema: { type: string } }]
    patch: { tags: [members], summary: Update member role (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
    delete: { tags: [members], summary: Remove member (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/leave:
    post: { tags: [members], summary: Leave workspace, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/invitations:
    get: { tags: [invitations], summary: List workspace invitations, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/workspaces/{id}/invitations/{invitationId}:
    delete: { tags: [invitations], summary: Revoke invitation (admin), parameters: [{ $ref: "#/components/parameters/PathId" }, { name: invitationId, in: path, required: true, schema: { type: string } }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/runtime-profiles:
    parameters: [{ $ref: "#/components/parameters/PathId" }]
    get: { tags: [runtimes], summary: List runtime profiles, responses: { "200": { $ref: "#/components/responses/GenericList" } } }
    post: { tags: [runtimes], summary: Create runtime profile (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/runtime-profiles/{profileId}:
    parameters: [{ $ref: "#/components/parameters/PathId" }, { name: profileId, in: path, required: true, schema: { type: string } }]
    get: { tags: [runtimes], summary: Get runtime profile, responses: { "200": { $ref: "#/components/responses/Generic" } } }
    patch: { tags: [runtimes], summary: Update runtime profile (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
    put: { tags: [runtimes], summary: Update runtime profile (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
    delete: { tags: [runtimes], summary: Delete runtime profile (admin), responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/github/installations:
    get: { tags: [integrations], summary: List GitHub installations, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/workspaces/{id}/github/connect:
    get: { tags: [integrations], summary: Start GitHub App connect (admin), parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/github/installations/{installationId}:
    delete: { tags: [integrations], summary: Disconnect GitHub installation (admin), parameters: [{ $ref: "#/components/parameters/PathId" }, { name: installationId, in: path, required: true, schema: { type: string } }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/lark/installations:
    get: { tags: [integrations], summary: List Lark installations, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/workspaces/{id}/lark/installations/{installationId}:
    delete: { tags: [integrations], summary: Revoke Lark installation (admin), parameters: [{ $ref: "#/components/parameters/PathId" }, { name: installationId, in: path, required: true, schema: { type: string } }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/lark/install/begin:
    post: { tags: [integrations], summary: Begin Lark device-flow install (admin), parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/lark/install/{sessionId}/status:
    get: { tags: [integrations], summary: Poll Lark install status, parameters: [{ $ref: "#/components/parameters/PathId" }, { name: sessionId, in: path, required: true, schema: { type: string } }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/slack/installations:
    get: { tags: [integrations], summary: List Slack installations, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/workspaces/{id}/slack/installations/{installationId}:
    delete: { tags: [integrations], summary: Revoke Slack installation (admin), parameters: [{ $ref: "#/components/parameters/PathId" }, { name: installationId, in: path, required: true, schema: { type: string } }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/workspaces/{id}/slack/install/byo:
    post: { tags: [integrations], summary: Register bring-your-own Slack app (admin), parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/lark/binding/redeem:
    post: { tags: [integrations], summary: Redeem Lark user binding token, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/slack/binding/redeem:
    post: { tags: [integrations], summary: Redeem Slack user binding token, responses: { "200": { $ref: "#/components/responses/Generic" } } }

  /api/invitations:
    get:
      tags: [invitations]
      summary: List my invitations
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Invitation" } } } } }
  /api/invitations/{id}:
    get: { tags: [invitations], summary: Get my invitation, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/invitations/{id}/accept:
    post: { tags: [invitations], summary: Accept invitation, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/invitations/{id}/decline:
    post: { tags: [invitations], summary: Decline invitation, parameters: [{ $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }

  # -------------------------------------------------------------------------
  # Issues (workspace-scoped: send X-Workspace-ID)
  # -------------------------------------------------------------------------
  /api/assignee-frequency:
    get:
      tags: [issues]
      summary: Assignment frequency per assignee (member or agent)
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AssigneeFrequencyEntry" } } } } }
  /api/issues:
    get:
      tags: [issues]
      summary: List issues
      parameters:
        - { $ref: "#/components/parameters/WorkspaceId" }
        - { name: project_id, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: assignee_id, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ListIssuesResponse" } } } }
    post:
      tags: [issues]
      summary: Create issue
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
        "409": { description: Active duplicate issue, content: { application/json: { schema: { $ref: "#/components/schemas/DuplicateIssueError" } } } }
  /api/issues/search:
    get: { tags: [issues], summary: Full-text search issues, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { name: q, in: query, schema: { type: string } }], responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ListIssuesResponse" } } } } } }
  /api/issues/child-progress:
    get: { tags: [issues], summary: Child-issue completion progress per parent, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/issues/children:
    get: { tags: [issues], summary: List children keyed by parent ids, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/grouped:
    get: { tags: [issues], summary: Issues grouped by assignee, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/quick-create:
    post: { tags: [issues], summary: Quick-create issue from natural language (agent authors it), parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/preview-trigger:
    post: { tags: [issues], summary: Preview which agents an issue create would trigger, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/batch-update:
    post: { tags: [issues], summary: Batch update issues, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/batch-delete:
    post: { tags: [issues], summary: Batch delete issues, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }]
    get:
      tags: [issues]
      summary: Get issue (UUID or human identifier like PROJ-42)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
    put:
      tags: [issues]
      summary: Update issue (status/assignee changes land in the activity log)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } } }
    delete: { tags: [issues], summary: Delete issue, responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/timeline:
    get:
      tags: [issues]
      summary: Issue timeline — merged activity-log entries + comments, oldest first. PRIMARY source for who-did-what-when.
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/TimelineEntry" } } } } }
  /api/issues/{id}/comments:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }]
    get:
      tags: [comments]
      summary: List comments
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Comment" } } } } }
    post:
      tags: [comments]
      summary: Create comment
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } } }
  /api/issues/{id}/comments/trigger-preview:
    post: { tags: [comments], summary: Preview agent triggers for a comment, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/subscribers:
    get: { tags: [issues], summary: List issue subscribers, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/issues/{id}/subscribe:
    post: { tags: [issues], summary: Subscribe to issue, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/unsubscribe:
    post: { tags: [issues], summary: Unsubscribe from issue, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/active-task:
    get: { tags: [tasks], summary: Active agent task for issue, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AgentTask" } } } } } }
  /api/issues/{id}/tasks/{taskId}/cancel:
    post: { tags: [tasks], summary: Cancel task on issue, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }, { $ref: "#/components/parameters/TaskId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/rerun:
    post: { tags: [tasks], summary: Re-run agent on issue, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/task-runs:
    get:
      tags: [tasks]
      summary: All agent task runs for an issue (created/started/completed timestamps → agent time-on-task)
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AgentTask" } } } } }
  /api/issues/{id}/usage:
    get: { tags: [issues], summary: Token/cost usage for an issue's agent runs, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/reactions:
    post: { tags: [issues], summary: Add reaction, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
    delete: { tags: [issues], summary: Remove reaction, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/attachments:
    get: { tags: [attachments], summary: List issue attachments, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
  /api/issues/{id}/children:
    get: { tags: [issues], summary: List child issues, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/labels:
    get: { tags: [labels], summary: List labels on issue, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/GenericList" } } }
    post: { tags: [labels], summary: Attach label, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/labels/{labelId}:
    delete: { tags: [labels], summary: Detach label, parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/PathId" }, { name: labelId, in: path, required: true, schema: { type: string } }], responses: { "200": { $ref: "#/components/responses/Generic" } } }
  /api/issues/{id}/metadata:
