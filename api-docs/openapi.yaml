components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Personal access token (`mul_...`), created via POST /api/tokens or Settings > API tokens."

  parameters:
    WorkspaceId:
      name: X-Workspace-ID
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: Workspace selector. `X-Workspace-Slug` is accepted as an alternative.
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string }
    RuntimeId:
      name: runtimeId
      in: path
      required: true
      schema: { type: string }
    RequestId:
      name: requestId
      in: path
      required: true
      schema: { type: string }
    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string }
    ProjectIdFilter:
      name: project_id
      in: query
      required: false
      schema: { type: string, format: uuid }

  responses:
    Generic:
      description: OK — shape not modeled here; see packages/core/api/client.ts and schemas.ts.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/GenericObject" }
    GenericList:
      description: OK — array; shape not modeled here; see packages/core/api/client.ts and schemas.ts.
      content:
        application/json:
          schema: { type: array, items: { $ref: "#/components/schemas/GenericObject" } }

  schemas:
    GenericObject:
      type: object
      additionalProperties: true

    AppConfig:
      type: object
      properties:
        cdn_domain: { type: string }
        cdn_signed: { type: boolean }
        allow_signup: { type: boolean }
        google_client_id: { type: string }
        posthog_key: { type: string }
        posthog_host: { type: string }
        analytics_environment: { type: string }
        daemon_server_url: { type: string }
        daemon_app_url: { type: string }
        workspace_creation_disabled: { type: boolean }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        avatar_url: { type: string, nullable: true }
        onboarded_at: { type: string, format: date-time, nullable: true }
        onboarding_questionnaire: { type: object, additionalProperties: true }
        starter_content_state: { type: string, nullable: true }
        language: { type: string, nullable: true }
        profile_description: { type: string }
        timezone: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Workspace:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        context: { type: string, nullable: true }
        settings: { type: object, additionalProperties: true }
        repos:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              description: { type: string }
        issue_prefix: { type: string }
        avatar_url: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MemberWithUser:
      type: object
      description: Workspace member joined with user profile.
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        role: { type: string, description: "owner | admin | member" }
        created_at: { type: string, format: date-time }
        name: { type: string }
        email: { type: string }
        avatar_url: { type: string, nullable: true }

    Invitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        inviter_id: { type: string, format: uuid }
        invitee_email: { type: string }
        invitee_user_id: { type: string, nullable: true }
        role: { type: string }
        status: { type: string, description: "pending | accepted | declined | expired" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    Issue:
      type: object
      description: >
        Assignees are polymorphic: assignee_type ("member" | "agent") +
        assignee_id. Same for creator_type/creator_id.
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        number: { type: integer }
        identifier: { type: string, description: "Human id, e.g. PROJ-42" }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, description: "Server enum as string (e.g. backlog/todo/in_progress/done/cancelled); treat unknown values gracefully" }
        priority: { type: string }
        assignee_type: { type: string, nullable: true, description: "member | agent" }
        assignee_id: { type: string, nullable: true }
        creator_type: { type: string }
        creator_id: { type: string }
        parent_issue_id: { type: string, nullable: true }
        project_id: { type: string, nullable: true }
        position: { type: number }
        stage: { type: integer, nullable: true }
        start_date: { type: string, nullable: true }
        due_date: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
        labels: { type: array, items: { $ref: "#/components/schemas/GenericObject" } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ListIssuesResponse:
      type: object
      properties:
        issues:
          type: array
          items: { $ref: "#/components/schemas/Issue" }
        total: { type: integer }

    DuplicateIssueError:
      type: object
      properties:
        code: { type: string, enum: [active_duplicate_issue] }
        error: { type: string }
        issue:
          type: object
          properties:
            id: { type: string }
            identifier: { type: string }
            title: { type: string }

    TimelineEntry:
      type: object
      description: >
        Union of activity-log rows (type=activity: action + details) and
        comments (type=comment: content + reactions). actor_type is
        member | agent | system. Status/assignee changes appear as activity
        entries — this is the raw material for time-in-status derivation.
      properties:
        type: { type: string, description: "activity | comment" }
        id: { type: string }
        actor_type: { type: string, description: "member | agent | system" }
        actor_id: { type: string }
        created_at: { type: string, format: date-time }
        action: { type: string, description: "Activity only, e.g. status_changed, assignee_changed" }
        details: { type: object, additionalProperties: true, description: "Activity only; JSONB payload (old/new values)" }
        content: { type: string, description: "Comment only" }
        parent_id: { type: string, nullable: true }
        updated_at: { type: string, format: date-time }
        comment_type: { type: string }
        reactions: { type: array, items: { $ref: "#/components/schemas/Reaction" } }
        attachments: { type: array, items: { $ref: "#/components/schemas/GenericObject" } }
        source_task_id: { type: string, nullable: true }

    Comment:
      type: object
      properties:
        id: { type: string }
        issue_id: { type: string }
        author_type: { type: string, description: "member | agent" }
        author_id: { type: string }
        content: { type: string }
        type: { type: string }
        parent_id: { type: string, nullable: true }
        reactions: { type: array, items: { $ref: "#/components/schemas/Reaction" } }
        attachments: { type: array, items: { $ref: "#/components/schemas/GenericObject" } }
        source_task_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Reaction:
      type: object
      properties:
        id: { type: string }
        comment_id: { type: string }
        actor_type: { type: string }
        actor_id: { type: string }
        emoji: { type: string }
        created_at: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        status: { type: string }
        priority: { type: string }
        lead_type: { type: string, nullable: true, description: "member | agent" }
        lead_id: { type: string, nullable: true }
        issue_count: { type: integer }
        done_count: { type: integer }
        resource_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AgentTask:
      type: object
      description: >
        Agent task run. Duration = completed_at - started_at; queue wait =
        started_at - created_at.
      properties:
        id: { type: string }
        agent_id: { type: string }
        runtime_id: { type: string }
        issue_id: { type: string }
        status: { type: string, description: "queued/running/completed/failed/cancelled — treat as open string" }
        priority: { type: integer }
        dispatched_at: { type: string, format: date-time, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        result: {}
        error: { type: string, nullable: true }
        failure_reason: { type: string }
        created_at: { type: string, format: date-time }
        chat_session_id: { type: string }
        autopilot_run_id: { type: string }
        parent_task_id: { type: string }
        attempt: { type: integer }
        kind: { type: string }

    AssigneeFrequencyEntry:
      type: object
      properties:
        assignee_type: { type: string, description: "member | agent" }
        assignee_id: { type: string }
        frequency: { type: integer }

    SquadMemberStatusList:
      type: object
      properties:
        members:
          type: array
          items:
            type: object
            properties:
              member_type: { type: string }
              member_id: { type: string }
              status: { type: string, nullable: true }
              last_active_at: { type: string, format: date-time, nullable: true }
              active_issues:
                type: array
                items:
                  type: object
                  properties:
                    issue_id: { type: string }
                    identifier: { type: string }
                    title: { type: string }
                    issue_status: { type: string }

    DashboardUsageDaily:
      type: object
      properties:
        date: { type: string }
        provider: { type: string }
        model: { type: string }
        input_tokens: { type: integer }
        output_tokens: { type: integer }
        cache_read_tokens: { type: integer }
        cache_write_tokens: { type: integer }
        task_count: { type: integer }

    DashboardUsageByAgent:
      type: object
      properties:
        agent_id: { type: string }
        provider: { type: string }
        model: { type: string }
        input_tokens: { type: integer }
        output_tokens: { type: integer }
        cache_read_tokens: { type: integer }
        cache_write_tokens: { type: integer }
        task_count: { type: integer }

    DashboardAgentRunTime:
      type: object
      properties:
        agent_id: { type: string }
        total_seconds: { type: integer }
        task_count: { type: integer }
        failed_count: { type: integer }

    DashboardRunTimeDaily:
      type: object
      properties:
        date: { type: string }
        total_seconds: { type: integer }
        task_count: { type: integer }
        failed_count: { type: integer }
